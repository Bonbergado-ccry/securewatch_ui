<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureWatch | User Management</title>
    <style>
        @import url('https://googleapis.com');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- SIDEBAR (Consistent Design) --- */
        .sidebar {
            width: 260px;
            background: #111827;
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            border-right: 1px solid #1f2937;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            flex-shrink: 0;
        }

        .sidebar.collapsed { width: 80px; padding: 20px 0; }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            height: 40px;
            padding: 0 10px;
        }

        .sidebar.collapsed .sidebar-header { justify-content: center; padding: 0; }
        .sidebar h2 { font-size: 1.1rem; font-weight: 800; color: #ffffff; margin: 0; letter-spacing: 1px; white-space: nowrap; }
        .sidebar h2 span { color: #dc2626; }
        .sidebar.collapsed h2, .sidebar.collapsed .menu-text { display: none; }

        .toggle-btn {
            background: #111827; border: none; color: #9ca3af; cursor: pointer;
            width: 40px; height: 40px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .toggle-btn:hover { color: #dc2626; background: #1e293b; }

        .menu-links { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .menu-item {
            height: 40px; padding: 0 12px; border-radius: 8px; text-decoration: none;
            color: #9ca3af; font-size: 13px; display: flex; align-items: center; transition: 0.3s;
        }
        .menu-item svg { width: 18px; height: 18px; margin-right: 12px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; }
        .sidebar.collapsed .menu-item { justify-content: center; padding: 0; width: 40px; margin: 0 auto; }
        .sidebar.collapsed .menu-item svg { margin-right: 0; }

        .menu-item:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .menu-item.active { background: rgba(220, 38, 38, 0.15); color: #dc2626; border: 1px solid rgba(220, 38, 38, 0.3); }

        .logout-btn {
            margin-top: auto; background: rgba(220, 38, 38, 0.05); border: 1px solid rgba(220, 38, 38, 0.2);
            color: #dc2626; height: 40px; border-radius: 8px; cursor: pointer; font-weight: 600;
            display: flex; align-items: center; padding: 0 12px; text-decoration: none;
        }
        .logout-btn svg { width: 18px; height: 18px; margin-right: 12px; stroke: currentColor; fill: none; stroke-width: 2; }
        .sidebar.collapsed .logout-btn { width: 40px; padding: 0; margin: 0 auto; justify-content: center; }

        /* --- MAIN CONTENT --- */
        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow-y: auto; background: #020617; }
        header { padding: 0 25px; height: 70px; background: #111827; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1f2937; flex-shrink: 0; }

        .content-area { padding: 30px; max-width: 1000px; margin: 0 auto; width: 100%; }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .page-header h1 { font-size: 1.5rem; font-weight: 800; }

        /* --- USER FORM / CARD --- */
        .card {
            background: #111827; padding: 25px; border-radius: 12px; border: 1px solid #1f2937; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card h3 { color: #dc2626; font-size: 13px; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }

        .user-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 11px; color: #94a3b8; font-weight: 600; }
        
        input, select {
            background: #020617; border: 1px solid #1f2937; color: white; padding: 10px; border-radius: 6px; outline: none; font-size: 13px;
        }
        input:focus { border-color: #dc2626; }

        .btn-add { background: #dc2626; color: white; border: none; padding: 10px 25px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: #b91c1c; transform: translateY(-2px); }

        /* --- TABLE --- */
        .table-container { background: #111827; border-radius: 12px; border: 1px solid #1f2937; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(255,255,255,0.02); padding: 15px; font-size: 11px; color: #94a3b8; text-transform: uppercase; border-bottom: 1px solid #1f2937; }
        td { padding: 15px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-admin { background: rgba(220, 38, 38, 0.1); color: #dc2626; border: 1px solid rgba(220, 38, 38, 0.2); }
        .badge-user { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.2); }

        .action-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 12px; font-weight: 600; margin-right: 10px; }
        .action-btn:hover { color: #dc2626; text-decoration: underline; }

        @media (max-width: 768px) {
            .content-area { padding: 15px; }
            .user-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="menu-text">SECURE<span>WATCH</span></h2>
            <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        </div>
        <div class="menu-links">
            <a href="index.html" class="menu-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg><span class="menu-text">Monitoring</span></a>
            <a href="logs.html" class="menu-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg><span class="menu-text">Incident Logs</span></a>
            <a href="playback.html" class="menu-item"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg><span class="menu-text">Playback</span></a>
            <a href="admin_config.html" class="menu-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg><span class="menu-text">AI Settings</span></a>
            <a href="users.html" class="menu-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span class="menu-text">User Management</span></a>
        </div>
        <a href="login.html" class="logout-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg><span class="logout-text">Logout</span></a>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="main-container">
        <header>
            <div style="font-size: 14px; color: #9ca3af;">Administrator Access</div>
            <div id="clock" style="font-family: monospace; color: #dc2626; font-weight: bold; font-size: 1.1rem;">00:00:00 PM</div>
        </header>

        <div class="content-area">
            <div class="page-header">
                <h1>System Users</h1>
            </div>

            <!-- ADD USER CARD -->
            <div class="card">
                <h3>Create New Account</h3>
                <div class="user-grid">
                    <div class="input-group">
                        <label>FULL NAME</label>
                        <input type="text" placeholder="Greg">
                    </div>
                    <div class="input-group">
                        <label>USERNAME</label>
                        <input type="text" placeholder="operator_01">
                    </div>
                    <div class="input-group">
                        <label>ROLE</label>
                        <select>
                            <option>Operator</option>
                            <option>Admin</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>PASSWORD</label>
                        <input type="password" placeholder="••••••••">
                    </div>
                </div>
                <button class="btn-add">REGISTER USER</button>
            </div>

            <!-- USERS TABLE -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>User Name</th>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Admin</td>
                            <td>greg</td>
                            <td><span class="badge badge-admin">Admin</span></td>
                            <td style="color: #10b981;">Online</td>
                            <td>
                                <button class="action-btn">Edit</button>
                            </td>
                        </tr>
                        <tr>
                            <td>MDRRMO</td>
                            <td>juan</td>
                            <td><span class="badge badge-user">Operator</span></td>
                            <td style="color: #64748b;">Offline</td>
                            <td>
                                <button class="action-btn">Edit</button>
                                <button class="action-btn" style="color: #ef4444;">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        // Security check
        if(localStorage.getItem("userRole") !== "admin"){
            alert("Unauthorized Access!");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
